<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediFlow - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo-container">
                <img src="images/mediflow_1st_generation_logo.png" alt="MediFlow Logo" class="logo">
            </div>
            <h1>Welcome to MediFlow</h1>
            <p>Please enter your credentials to continue</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Enter username">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter password">
                </div>
                <div id="errorMessage" class="error-message"></div>
                <button type="submit" class="login-button">Login</button>
            </form>

            <a href="https://lam-arch.github.io/mediflow_homepage/" class="homepage-link" target="_blank" rel="noopener noreferrer">
                Visit MediFlow Homepage →
            </a>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
