<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patients Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="page-header">
    <div class="page-header__content">
      <div class="header-brand">
        <div>
          <img src="Promotional Package/mediflow_1st_generation_logo.png" alt="MediFlow" class="header-logo" />
          <p class="eyebrow">Reception Dashboard</p>
          <h1 id="page-title">Patients for</h1>
        </div>
      </div>
      <div class="header-actions">
        <span id="refresh-status" class="small-text">Loading…</span>
        <button id="refresh-button" class="primary-button">Refresh</button>
        <a href="https://choppedtomato277.github.io/mediflow_login/" class="secondary-button">Logout</a>
      </div>
    </div>
  </header>

  <main class="page-main">
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search by patient name or ID..." aria-label="Search patients" />
      <input type="date" id="date-filter" aria-label="Filter by date" />
    </div>
    <section id="dashboard-grid" class="dashboard-grid" aria-live="polite"></section>
  </main>

  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
