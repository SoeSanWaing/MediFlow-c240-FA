<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient Details</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="page-header">
    <div class="page-header__content">
      <div>
        <p class="eyebrow">Patient Details</p>
        <h1 id="patient-name">Patient</h1>
      </div>
      <a href="index.html" class="secondary-button">Back to Dashboard</a>
    </div>
  </header>

  <main class="page-main">
    <section class="category-card" id="details-card">
      <div id="details-content">Loading patient details…</div>
    </section>
  </main>

  <script>
    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function formatDateTime(iso) {
      if (!iso) return 'Not available';
      const date = new Date(iso);
      return date.toLocaleString(undefined, {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        hour: 'numeric',
        minute: '2-digit',
      });
    }

    function formatWaitDisplay(patient) {
      if (patient.waitTimeMinutes !== null && patient.waitTimeMinutes !== undefined && patient.waitTimeMinutes !== '') {
        const status = String(patient.status || '').toLowerCase();
        if (status === 'in progress' || status === 'in-progress') {
          return 'In consultation';
        }
        if (status === 'emergency') {
          return 'Emergency - awaiting ambulance';
        }
        const assignedTime = patient.assignedDateTime || patient.arrivalTime;
        if (assignedTime) {
          const assigned = new Date(assignedTime);
          const elapsedMins = Math.floor((Date.now() - assigned.getTime()) / 60000);
          const remaining = Math.max(0, patient.waitTimeMinutes - elapsedMins);
          return remaining === 0 ? 'Due now' : `${remaining} min wait`;
        }
        return `${patient.waitTimeMinutes} min wait`;
      }
      return 'Not available';
    }

    function renderPatientDetails(patient) {
      const details = document.getElementById('details-content');
      document.getElementById('patient-name').textContent = patient.name;

      details.innerHTML = `
        <div style="display: grid; gap: 18px;">
          <div><strong>Patient ID:</strong> ${patient.id}</div>
          <div><strong>Category:</strong> ${patient.category || 'Uncategorized'}</div>
          <div><strong>Condition:</strong> ${patient.complaint || patient.condition || ''}</div>
          <div><strong>Doctor:</strong> ${patient.assignedDoctor || 'Unassigned'}</div>
          <div><strong>Severity:</strong> ${patient.severity}</div>
          <div><strong>Status:</strong> ${patient.status}</div>
          <div><strong>Assigned date time:</strong> ${formatDateTime(patient.assignedDateTime)}</div>
          ${isPatientToday(patient) ? `<div><strong>Wait time:</strong> ${formatWaitDisplay(patient)}</div>` : ''}
        </div>
      `;
    }

    function isPatientToday(patient) {
      const recordDate = (patient.arrivalTime || patient.assignedDateTime || '').slice(0, 10);
      const today = new Date().toISOString().slice(0, 10);
      return recordDate === today;
    }

    function renderNotFound() {
      const details = document.getElementById('details-content');
      details.innerHTML = '<p>No matching patient record was found for this ID.</p>';
    }

    function loadPatientDetails() {
      const patientId = getQueryParam('id');
      if (!patientId) {
        renderNotFound();
        return;
      }

      // Load patient records from localStorage (saved by dashboard on click)
      const stored = localStorage.getItem('patientRecords');
      if (!stored) {
        renderNotFound();
        return;
      }

      try {
        const patients = JSON.parse(stored);
        const patient = patients.find((record) => String(record.id) === String(patientId));

        if (patient) {
          renderPatientDetails(patient);
        } else {
          renderNotFound();
        }
      } catch (error) {
        renderNotFound();
      }
    }

    loadPatientDetails();
  </script>
</body>
</html>
